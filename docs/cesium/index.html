<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LEOPath Cesium Constellation Viewer</title>
  <script defer src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/dist/satellite.min.js"></script>
  <script defer src="./viewer.js"></script>
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="cesiumContainer" aria-label="Interactive 3D constellation viewer"></main>

  <aside class="panel" aria-label="Visualization controls">
    <div class="panel__header">
      <p class="panel__meta">LEOPath / Cesium</p>
      <button id="hidePanel" class="panel-hide" type="button">Hide</button>
      <h1>Constellation state</h1>
      <p>
        TLE propagation for the single-shell evaluation constellations.
        Ground stations use the paper evaluation set.
      </p>
    </div>

    <label class="field" for="constellationSelect">
      <span>Constellation</span>
      <select id="constellationSelect"></select>
    </label>

    <label class="field" for="islTopology">
      <span>ISL topology</span>
      <select id="islTopology">
        <option value="none">None</option>
        <option value="ring" selected>Ring</option>
        <option value="grid">+Grid</option>
      </select>
    </label>

    <label class="field" for="routeSource">
      <span>Topological route &mdash; source</span>
      <select id="routeSource"><option value="">None</option></select>
    </label>

    <label class="field" for="routeTarget">
      <span>Topological route &mdash; destination</span>
      <select id="routeTarget"><option value="">None</option></select>
    </label>

    <div class="control-grid">
      <label><input id="showGround" type="checkbox" checked> Ground stations</label>
      <label id="showGslLabel"><input id="showGsl" type="checkbox" checked> GSL attachments</label>
      <label id="fullDensityLabel"><input id="fullDensity" type="checkbox"> Render all satellites</label>
      <label><input id="showLinkStateRoute" type="checkbox"> Shortest-path route (link-state)</label>
    </div>

    <label class="field" for="speedSlider">
      <span>Clock speed: <output id="speedLabel">120x</output></span>
      <input id="speedSlider" type="range" min="1" max="1440" step="1" value="120">
    </label>

    <button id="resetButton" type="button">Reset camera</button>

    <p id="status" class="status" role="status">Loading configuration...</p>
    <div id="stats" class="stats" aria-live="polite"></div>

    <a id="tleLink" class="tle-link" href="#" target="_blank" rel="noopener">Open TLE data</a>
  </aside>
  <button id="showPanel" class="panel-toggle" type="button" hidden>Controls</button>
</body>
</html>
